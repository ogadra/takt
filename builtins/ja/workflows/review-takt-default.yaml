name: review-takt-default
description: TAKT開発向け多角レビュー（AIアンチパターン・コーディングレビュー含む7観点レビュー）
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 10
initial_step: gather

steps:
  - name: gather
    tags:
      - plan
    edit: false
    persona: planner
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: gather-review
    output_contracts:
      report:
        - name: review-target.md
          format: review-gather
    rules:
      - condition: レビュー対象の情報収集完了
        next: reviewers
      - condition: レビュー対象を特定できない、情報不足
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}

  - name: reviewers
    tags:
      - review
    parallel:
      - name: arch-review
        tags:
          - review
        edit: false
        persona: architecture-reviewer
        policy: review
        knowledge:
          - architecture
          - takt
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-arch
        output_contracts:
          report:
            - name: architecture-review.md
              format: architecture-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: security-review
        tags:
          - review
        edit: false
        persona: security-reviewer
        policy: review
        knowledge: security
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-security
        output_contracts:
          report:
            - name: security-review.md
              format: security-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: qa-review
        tags:
          - review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - qa
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-qa
        output_contracts:
          report:
            - name: qa-review.md
              format: qa-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: testing-review
        tags:
          - review
        edit: false
        persona: testing-reviewer
        policy:
          - review
          - testing
        knowledge:
          - unit-testing
          - e2e-testing
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-test
        output_contracts:
          report:
            - name: testing-review.md
              format: testing-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: ai-antipattern-review-2nd
        tags:
          - review
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: ai-antipattern-review
        output_contracts:
          report:
            - name: ai-antipattern-review.md
              format: ai-antipattern-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: coding-review
        tags:
          - review
        edit: false
        persona: coding-reviewer
        policy:
          - review
          - coding
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-coding
        output_contracts:
          report:
            - name: coding-review.md
              format: coding-review
        rules:
          - condition: approved
          - condition: needs_fix

    rules:
      - condition: all("approved")
        next: final-gate
      - condition: any("needs_fix")
        next: supervise

  - name: final-gate
    tags:
      - review
      - final-gate
    parallel:
      - name: merge-readiness-review
        tags:
          - review
          - final-gate
          - merge-readiness
        edit: false
        persona: merge-readiness-reviewer
        policy: review
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-merge-readiness
        output_contracts:
          report:
            - name: merge-readiness-review.md
              format: merge-readiness-review
        rules:
          - condition: approved
          - condition: needs_fix
      - name: review-synthesis
        tags:
          - review
          - final-gate
          - supervise
        edit: false
        persona: supervisor
        policy: review
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        pass_previous_response: false
        rules:
          - condition: approved
        instruction: &review_synthesis_instruction |
          ## レビュー結果
          {previous_response}

          **これはレビュー専用 workflow です。** テスト実行やビルドは行わないでください。
          レビュー結果を統合し、最終サマリーを作成する役割です。

          **やること:**
          1. Report Directory内の全レビューレポートを読む
             - `00-review-target.md`（レビュー対象情報）
             - `01-architecture-review.md`（アーキテクチャレビュー）
             - `02-security-review.md`（セキュリティレビュー）
             - `03-qa-review.md`（QAレビュー）
             - `04-testing-review.md`（テストレビュー）
             - `05-ai-antipattern-review.md`（AIアンチパターンレビュー）
             - `06-coding-review.md`（コーディングレビュー）
          2. 6つのレビュー結果を統合
          3. 統合レビューサマリーと総合判定を作成
        output_contracts: &review_synthesis_output_contracts
          report:
            - name: review-summary.md
              format: |
                ```markdown
                # レビューサマリー

                ## 総合判定: APPROVE / REJECT

                ## サマリー
                {2-3文で全レビュー結果を統合}

                ## レビュー結果
                | レビュー | 結果 | 主要な発見 |
                |---------|------|-----------|
                | アーキテクチャ | APPROVE/REJECT | {概要} |
                | セキュリティ | APPROVE/REJECT | {概要} |
                | QA | APPROVE/REJECT | {概要} |
                | テスト | APPROVE/REJECT | {概要} |
                | AIアンチパターン | APPROVE/REJECT | {概要} |
                | コーディング | APPROVE/REJECT | {概要} |

                ## 今回の指摘（new）
                | # | finding_id | 重大度 | ソース | 場所 | 問題 | 修正案 |
                |---|------------|--------|--------|------|------|--------|
                | 1 | SUM-NEW-src-file-L42 | High | セキュリティ | `file:line` | 説明 | 提案 |

                ## 継続指摘（persists）
                | # | finding_id | ソース | 前回根拠 | 今回根拠 | 問題 |
                |---|------------|--------|----------|----------|------|
                | 1 | SUM-PERSIST-src-file-L77 | アーキテクチャ | `file:line` | `file:line` | 説明 |

                ## 解消済み（resolved）
                | finding_id | ソース | 解消根拠 |
                |------------|--------|----------|
                | SUM-RESOLVED-src-file-L10 | QA | `file:line` |

                ## 改善提案
                - {全レビューからの統合提案}

                ## REJECT判定条件
                - `new` または `persists` が1件以上ある場合のみ REJECT 可
                - `finding_id` なしの指摘は無効
                ```
    rules:
      - condition: all("approved")
        next: COMPLETE
      - condition: any("needs_fix")
        next: COMPLETE

  - name: supervise
    tags:
      - review
      - supervise
    edit: false
    persona: supervisor
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    pass_previous_response: false
    rules:
      - condition: レビュー統合完了
        next: COMPLETE
    instruction: *review_synthesis_instruction
    output_contracts: *review_synthesis_output_contracts