name: research
description: Research workflow - autonomously executes research without asking questions
workflow_config:
  provider_options:
    claude:
      allowed_tools:
        - Read
        - Glob
        - Grep
        - WebSearch
        - WebFetch
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 10
initial_step: plan
steps:
  - name: plan
    tags:
      - plan
    persona: research-planner
    policy: research
    knowledge: research
    instruction: research-plan
    rules:
      - condition: Planning is complete
        next: dig
      - condition: Insufficient information to create a plan
        next: ABORT
  - name: dig
    tags:
      - plan
    persona: research-digger
    policy: research
    knowledge: research
    instruction: research-dig
    rules:
      - condition: Research is complete
        next: supervise
      - condition: Unable to conduct research
        next: ABORT
  - name: supervise
    tags:
      - review
      - supervise
    persona: research-supervisor
    policy: research
    knowledge: research
    instruction: research-supervise
    rules:
      - condition: Research results adequately answer the original request
        next: COMPLETE
      - condition: Research results are insufficient and replanning is needed
        next: plan
