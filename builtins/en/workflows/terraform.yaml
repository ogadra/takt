name: terraform
description: Terraform IaC development workflow (plan → implement → parallel review → final gate → fix → complete)
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 15
initial_step: plan
steps:
  - name: plan
    tags:
      - plan
    edit: false
    persona: planner
    knowledge: terraform-aws
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    rules:
      - condition: Requirements are clear and implementable
        next: implement
      - condition: User is asking a question (not an implementation task)
        next: COMPLETE
      - condition: Requirements are unclear or insufficient
        next: ABORT
    instruction: plan
    output_contracts:
      report:
        - name: plan.md
          format: plan
  - name: implement
    tags:
      - coding
    edit: true
    persona: terraform-coder
    policy:
      - terraform
    knowledge: terraform-aws
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    quality_gates:
      - terraform fmt -check passes without errors
      - terraform validate succeeds
      - terraform plan is executable (no errors)
    instruction: implement-terraform
    rules:
      - condition: Implementation is complete
        next: reviewers
      - condition: Cannot proceed with implementation
        next: ABORT
      - condition: User input needed for confirmation
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
  - name: reviewers
    tags:
      - review
    parallel:
      - name: tf_review
        tags:
          - review
        edit: false
        persona: terraform-reviewer
        policy:
          - review
          - terraform
        knowledge: terraform-aws
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-terraform
        rules:
          - condition: Complies with Terraform conventions
          - condition: Convention violations found
        output_contracts:
          report:
            - name: terraform-review.md
              format: terraform-review
      - name: ai-antipattern-review-2nd
        tags:
          - review
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: ai-antipattern-review
        rules:
          - condition: No AI-specific issues
          - condition: AI-specific issues found
        output_contracts:
          report:
            - name: ai-antipattern-review.md
              format: ai-antipattern-review
      - name: coding-review
        tags:
          - review
        edit: false
        persona: coding-reviewer
        policy:
          - review
          - coding
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-coding
        output_contracts:
          report:
            - name: coding-review.md
              format: coding-review
        rules:
          - condition: approved
          - condition: needs_fix
    rules:
      - condition: all("Complies with Terraform conventions", "No AI-specific issues", "approved")
        next: final-gate
      - condition: any("Convention violations found", "AI-specific issues found", "needs_fix")
        next: supervise
  - name: final-gate
    tags:
      - review
      - final-gate
    parallel:
      - name: merge-readiness-review
        tags:
          - review
          - final-gate
          - merge-readiness
        edit: false
        persona: merge-readiness-reviewer
        policy: review
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-merge-readiness
        output_contracts:
          report:
            - name: merge-readiness-review.md
              format: merge-readiness-review
      - name: final-supervise
        tags:
          - review
        edit: &terraform_supervise_edit false
        persona: &terraform_supervise_persona supervisor
        policy: &terraform_supervise_policy review
        knowledge: &terraform_supervise_knowledge terraform-aws
        provider_options: &terraform_supervise_provider_options
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: &terraform_supervise_instruction supervise
        rules:
          - condition: All reviewers approved and mergeable quality
          - condition: Only AI-specific issues need fixing
          - condition: Only convention violations or mergeability issues need fixing
          - condition: Multiple types of issues found
          - condition: Irreconcilable requirement conflict, user decision needed
        output_contracts: &terraform_supervise_output_contracts
          report:
            - name: supervisor-validation.md
              format: supervisor-validation
            - name: summary.md
              format: summary
              use_judge: false
    rules:
      - condition: all("approved", "All reviewers approved and mergeable quality")
        next: COMPLETE
      - condition: all("needs_fix", "Only AI-specific issues need fixing")
        next: fix_both
      - condition: any("Multiple types of issues found")
        next: fix_both
      - condition: any("Irreconcilable requirement conflict, user decision needed")
        next: ABORT
      - condition: any("Only AI-specific issues need fixing")
        next: ai-antipattern-fix
      - condition: any("needs_fix", "Only convention violations or mergeability issues need fixing")
        next: supervise_fix
  - name: supervise
    tags:
      - review
      - supervise
    edit: *terraform_supervise_edit
    persona: *terraform_supervise_persona
    policy: *terraform_supervise_policy
    knowledge: *terraform_supervise_knowledge
    provider_options: *terraform_supervise_provider_options
    instruction: *terraform_supervise_instruction
    rules:
      - condition: All reviewers approved and mergeable quality
        next: COMPLETE
      - condition: Only AI-specific issues need fixing
        next: ai-antipattern-fix
      - condition: Only convention violations or mergeability issues need fixing
        next: supervise_fix
      - condition: Multiple types of issues found
        next: fix_both
      - condition: Irreconcilable requirement conflict, user decision needed
        next: ABORT
    output_contracts: *terraform_supervise_output_contracts
  - name: fix_both
    tags:
      - coding
    parallel:
      - name: ai-antipattern-fix-parallel
        tags:
          - coding
        edit: true
        persona: terraform-coder
        policy:
          - terraform
        knowledge: terraform-aws
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Edit
              - Bash
              - WebSearch
              - WebFetch
        rules:
          - condition: AI issue fix complete
          - condition: No fix needed (target file/spec verified)
          - condition: Cannot determine, insufficient info
        instruction: ai-antipattern-fix
      - name: supervise_fix_parallel
        tags:
          - coding
        edit: true
        persona: terraform-coder
        policy:
          - terraform
        knowledge: terraform-aws
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Edit
              - Bash
              - WebSearch
              - WebFetch
        rules:
          - condition: Supervisor's findings have been fixed
          - condition: Cannot proceed with fix
        instruction: fix-supervisor
    rules:
      - condition: all("AI issue fix complete", "Supervisor's findings have been fixed")
        next: reviewers
      - condition: any("No fix needed (target file/spec verified)", "Cannot determine, insufficient info", "Cannot proceed with fix")
        next: implement
  - name: ai-antipattern-fix
    tags:
      - coding
    edit: true
    persona: terraform-coder
    policy:
      - terraform
    knowledge: terraform-aws
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    pass_previous_response: false
    rules:
      - condition: AI issue fix complete
        next: reviewers
      - condition: No fix needed (target file/spec verified)
        next: implement
      - condition: Cannot determine, insufficient info
        next: implement
    instruction: ai-antipattern-fix
  - name: supervise_fix
    tags:
      - coding
    edit: true
    persona: terraform-coder
    policy:
      - terraform
    knowledge: terraform-aws
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    pass_previous_response: false
    rules:
      - condition: Supervisor's findings have been fixed
        next: reviewers
      - condition: Cannot proceed with fix
        next: implement
    instruction: fix-supervisor
loop_monitors:
  - cycle: [fix_both, reviewers]
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        The review → fix cycle has repeated {cycle_count} times.
        Check the review report history in the Report Directory and assess convergence.

        **Signs of unproductive cycling:**
        - Same finding_id oscillating between resolved → new
        - New issues keep arising as side effects of previous fixes
        - Reviewer findings conflict with task requirements and cannot be reconciled
      rules:
        - condition: Healthy (new issues trending down)
          next: fix_both
        - condition: Unproductive (oscillation or requirement conflict)
          next: ABORT
  - cycle: [ai-antipattern-fix, reviewers]
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        The AI fix → review cycle has repeated {cycle_count} times.
        Check the review report history in the Report Directory and assess convergence.

        **Signs of unproductive cycling:**
        - Same finding_id oscillating between resolved → new
        - New issues keep arising as side effects of previous fixes
        - Reviewer findings conflict with task requirements and cannot be reconciled
      rules:
        - condition: Healthy (new issues trending down)
          next: ai-antipattern-fix
        - condition: Unproductive (oscillation or requirement conflict)
          next: ABORT
  - cycle: [supervise_fix, reviewers]
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        The supervisor fix → review cycle has repeated {cycle_count} times.
        Check the review report history in the Report Directory and assess convergence.

        **Signs of unproductive cycling:**
        - Same finding_id oscillating between resolved → new
        - New issues keep arising as side effects of previous fixes
        - Reviewer findings conflict with task requirements and cannot be reconciled
      rules:
        - condition: Healthy (new issues trending down)
          next: supervise_fix
        - condition: Unproductive (oscillation or requirement conflict)
          next: ABORT
