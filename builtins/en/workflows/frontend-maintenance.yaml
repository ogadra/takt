name: frontend-maintenance
description: Strict frontend maintenance workflow for existing production systems
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 30
initial_step: plan
loop_monitors:
  - cycle:
      - ai-antipattern-review-1st
      - ai-antipattern-fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-antipattern-fix
      rules:
        - condition: Healthy (making progress)
          next: ai-antipattern-review-1st
        - condition: Unproductive (no improvement)
          next: reviewers_1
  - cycle:
      - reviewers_1
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: converging (findings decreasing, fixes applied)
          next: reviewers_1
        - condition: unproductive (same findings repeating)
          next: supervise
steps:
  - name: plan
    edit: false
    persona: planner
    policy:
      - design-planning
      - existing-system-respect
    knowledge:
      - frontend
      - react
      - architecture
      - existing-system
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: plan-maintenance
    rules:
      - condition: Task analysis and planning is complete
        next: write_tests
      - condition: Requirements are unclear and planning cannot proceed
        next: ABORT
    output_contracts:
      report:
        - name: plan.md
          format: plan-frontend
  - name: write_tests
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - existing-system-respect
    knowledge:
      - frontend
      - react
      - architecture
      - unit-testing
      - e2e-testing
      - existing-system
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: write-tests-maintenance
    rules:
      - condition: Test creation is complete
        next: implement
      - condition: Skipping test creation as target is not yet implemented
        next: implement
      - condition: Cannot proceed with test creation
        next: plan
      - condition: User input required for clarification
        next: write_tests
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: test-report.md
          format: test-report
  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - design-fidelity
      - existing-system-respect
    session: refresh
    knowledge:
      - frontend
      - react
      - security
      - architecture
      - existing-system
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    instruction: implement-maintenance
    rules:
      - condition: Implementation is complete
        next: ai-antipattern-review-1st
      - condition: No implementation (report only)
        next: ai-antipattern-review-1st
      - condition: Cannot proceed with implementation
        next: ai-antipattern-review-1st
      - condition: User input required
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: maintenance-scope.md
          format: maintenance-scope
        - name: coder-decisions.md
          format: coder-decisions
  - name: ai-antipattern-review-1st
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
      - existing-system-respect
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: ai-antipattern-review
    rules:
      - condition: No AI-specific issues found
        next: reviewers_1
      - condition: AI-specific issues detected
        next: ai-antipattern-fix
    output_contracts:
      report:
        - name: ai-antipattern-review.md
          format: ai-antipattern-review
    knowledge:
      - existing-system
  - name: ai-antipattern-fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - design-fidelity
      - existing-system-respect
    session: refresh
    knowledge:
      - frontend
      - react
      - security
      - architecture
      - existing-system
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    instruction: ai-antipattern-fix
    pass_previous_response: false
    rules:
      - condition: AI Reviewer's issues have been fixed
        next: ai-antipattern-review-1st
      - condition: No fix needed (verified target files/spec)
        next: ai-antipattern-no-fix
      - condition: Unable to proceed with fixes
        next: ai-antipattern-no-fix
  - name: ai-antipattern-no-fix
    edit: false
    persona: architecture-reviewer
    policy:
      - review
      - existing-system-respect
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    rules:
      - condition: ai-antipattern-review-1st's findings are valid (fix required)
        next: ai-antipattern-fix
      - condition: ai-antipattern-fix's judgment is valid (no fix needed)
        next: reviewers_1
    instruction: arbitrate
    knowledge:
      - existing-system
  - name: reviewers_1
    parallel:
      - name: arch-review
        edit: false
        persona: architecture-reviewer
        policy:
          - review
          - existing-system-respect
        knowledge:
          - architecture
          - frontend
          - react
          - existing-system
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-arch
        output_contracts:
          report:
            - name: architect-review.md
              format: architecture-review
      - name: frontend-review
        edit: false
        persona: frontend-reviewer
        policy:
          - review
          - design-fidelity
          - existing-system-respect
        knowledge:
          - frontend
          - react
          - existing-system
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-frontend
        output_contracts:
          report:
            - name: frontend-review.md
              format: frontend-review
      - name: testing-review
        edit: false
        persona: testing-reviewer
        policy:
          - review
          - testing
          - existing-system-respect
        knowledge:
          - unit-testing
          - e2e-testing
          - existing-system
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-test
        output_contracts:
          report:
            - name: testing-review.md
              format: testing-review
      - name: ai-antipattern-review-2nd
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
          - existing-system-respect
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: ai-antipattern-review
        rules:
          - condition: approved
          - condition: needs_fix
        output_contracts:
          report:
            - name: ai-antipattern-review.md
              format: ai-antipattern-review
        knowledge:
          - existing-system
    rules:
      - condition: all("approved")
        next: reviewers_2
      - condition: any("needs_fix")
        next: fix
  - name: reviewers_2
    parallel:
      - name: security-review
        edit: false
        persona: security-reviewer
        policy:
          - review
          - existing-system-respect
        knowledge:
          - security
          - existing-system
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-security
        output_contracts:
          report:
            - name: security-review.md
              format: security-review
      - name: qa-review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - qa
          - existing-system-respect
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-qa
        output_contracts:
          report:
            - name: qa-review.md
              format: qa-review
        knowledge:
          - existing-system
    rules:
      - condition: all("approved")
        next: supervise
      - condition: any("needs_fix")
        next: fix
  - name: fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - design-fidelity
      - existing-system-respect
    knowledge:
      - frontend
      - react
      - security
      - architecture
      - existing-system
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    rules:
      - condition: Fix complete
        next: reviewers_1
      - condition: Cannot proceed, insufficient info
        next: plan
    instruction: fix-maintenance
  - name: supervise
    edit: false
    persona: dual-supervisor
    policy:
      - review
      - existing-system-respect
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: supervise-maintenance
    pass_previous_response: false
    rules:
      - condition: All validations pass and ready to merge
        next: COMPLETE
      - condition: Issues detected during final review
        next: fix_supervisor
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
    knowledge:
      - existing-system
  - name: fix_supervisor
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - design-fidelity
      - existing-system-respect
    knowledge:
      - frontend
      - react
      - security
      - architecture
      - existing-system
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    instruction: fix-maintenance
    pass_previous_response: false
    rules:
      - condition: Supervisor's issues have been fixed
        next: supervise
      - condition: Unable to proceed with fixes
        next: plan
