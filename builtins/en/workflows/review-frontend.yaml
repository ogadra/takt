name: review-frontend
description: Frontend-focused review (structure, modularization, component design, security, QA)
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 10
initial_step: gather

steps:
  - name: gather
    tags:
      - plan
    edit: false
    persona: planner
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: gather-review
    output_contracts:
      report:
        - name: review-target.md
          format: review-gather
    rules:
      - condition: Review target information gathered
        next: reviewers
      - condition: Unable to identify review target, insufficient information
        next: ABORT

  - name: reviewers
    tags:
      - review
    parallel:
      - name: arch-review
        tags:
          - review
        edit: false
        persona: architecture-reviewer
        policy: review
        knowledge:
          - architecture
          - frontend
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: review-arch
        output_contracts:
          report:
            - name: architect-review.md
              format: architecture-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: frontend-review
        tags:
          - review
        edit: false
        persona: frontend-reviewer
        policy:
          - review
          - design-fidelity
        knowledge: frontend
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: review-frontend
        output_contracts:
          report:
            - name: frontend-review.md
              format: frontend-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: security-review
        tags:
          - review
        edit: false
        persona: security-reviewer
        policy: review
        knowledge: security
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: review-security
        output_contracts:
          report:
            - name: security-review.md
              format: security-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: qa-review
        tags:
          - review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - qa
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: review-qa
        output_contracts:
          report:
            - name: qa-review.md
              format: qa-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: coding-review
        tags:
          - review
        edit: false
        persona: coding-reviewer
        policy:
          - review
          - coding
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-coding
        output_contracts:
          report:
            - name: coding-review.md
              format: coding-review
        rules:
          - condition: approved
          - condition: needs_fix

    rules:
      - condition: all("approved")
        next: final-gate
      - condition: any("needs_fix")
        next: supervise

  - name: final-gate
    tags:
      - review
      - final-gate
    parallel:
      - name: merge-readiness-review
        tags:
          - review
          - final-gate
          - merge-readiness
        edit: false
        persona: merge-readiness-reviewer
        policy: review
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
              - WebSearch
              - WebFetch
        instruction: review-merge-readiness
        output_contracts:
          report:
            - name: merge-readiness-review.md
              format: merge-readiness-review
        rules:
          - condition: approved
          - condition: needs_fix
      - name: review-synthesis
        tags:
          - review
          - final-gate
          - supervise
        edit: false
        persona: supervisor
        policy: review
        provider_options: &review_synthesis_provider_options
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        pass_previous_response: false
        instruction: &review_synthesis_instruction supervise
        output_contracts: &review_synthesis_output_contracts
          report:
            - name: supervisor-validation.md
              format: supervisor-validation
            - name: summary.md
              format: summary
              use_judge: false
        rules:
          - condition: approved
    rules:
      - condition: all("approved")
        next: COMPLETE
      - condition: any("needs_fix")
        next: COMPLETE

  - name: supervise
    tags:
      - review
      - supervise
    edit: false
    persona: supervisor
    policy: review
    provider_options: *review_synthesis_provider_options
    pass_previous_response: false
    instruction: *review_synthesis_instruction
    output_contracts: *review_synthesis_output_contracts
    rules:
      - condition: Review integration complete
        next: COMPLETE
