name: takt-default-deep-review
description: takt-default with the deep review lineup. Uses deep-peer-review (adds an implementation-semantics reviewer) and distributes the same knowledge to the coder side (plan -> write_tests -> draft -> deep-peer-review -> COMPLETE).
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 50
initial_step: plan
steps:
  - name: plan
    tags:
      - plan
    edit: false
    persona: planner
    knowledge: architecture
    provider_options:
      extends: review-readonly
    rules:
      - condition: Requirements are clear and implementable
        next: write_tests
      - condition: User is asking a question (not an implementation task)
        next: COMPLETE
      - condition: Requirements unclear, insufficient info
        next: ABORT
        appendix: |
          Items to confirm:
          - {question 1}
          - {question 2}
    instruction: plan
    output_contracts:
      report:
        - name: plan.md
          format: plan
  - name: write_tests
    tags:
      - coding
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge:
      - takt
      - architecture
      - unit-testing
      - e2e-testing
      - implementation-semantics
    provider_options:
      extends: edit
    required_permission_mode: edit
    instruction: write-tests-first
    rules:
      - condition: Tests written
        next: draft
      - condition: Skip test writing because target is not yet implemented
        next: draft
      - condition: Cannot proceed with writing tests
        next: plan
      - condition: User input required for confirmation
        next: write_tests
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: test-report.md
          format: test-report
  - name: draft
    kind: workflow_call
    call: draft
    args:
      impl_knowledge:
        - takt
        - architecture
        - task-decomposition
        - implementation-semantics
      fix_knowledge:
        - takt
        - architecture
        - implementation-semantics
    rules:
      - condition: COMPLETE
        next: peer-review
      - condition: need_replan
        next: plan
      - condition: ABORT
        next: ABORT
  - name: peer-review
    kind: workflow_call
    call: deep-peer-review
    rules:
      - condition: COMPLETE
        next: COMPLETE
      - condition: need_replan
        next: plan
      - condition: ABORT
        next: ABORT
